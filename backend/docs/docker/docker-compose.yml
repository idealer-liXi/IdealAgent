services:
  agent-mysql:
    image: ${AGENT_MYSQL_IMAGE:-agent-mysql:8.0.32}
    build:
      context: ./images/mysql
    container_name: agent-mysql
    restart: unless-stopped
    ports:
      - "${AGENT_MYSQL_PORT:-13306}:3306"
    environment:
      MYSQL_DATABASE: ${IDEAL_AGENT_MYSQL_DATABASE}
      MYSQL_USER: ${IDEAL_AGENT_USERNAME}
      MYSQL_PASSWORD: ${IDEAL_AGENT_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${IDEAL_AGENT_ROOT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - agent-mysql-data:/var/lib/mysql
      - ./conf/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ../mysql/ideal_agent_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../mysql/ideal_agent_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - agent-network

  agent-pgvector:
    image: ${AGENT_PGVECTOR_IMAGE:-agent-pgvector:0.7.4-pg16}
    build:
      context: ./images/pgvector
    container_name: agent-pgvector
    restart: unless-stopped
    ports:
      - "${AGENT_PGVECTOR_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ideal_agent
      POSTGRES_USER: ${IDEAL_AGENT_USERNAME}
      POSTGRES_PASSWORD: ${IDEAL_AGENT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - agent-pgvector-data:/var/lib/postgresql/data
      - ./conf/pgvector.sql:/docker-entrypoint-initdb.d/01_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d ideal_agent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - agent-network

  agent-backend:
    image: ${AGENT_BACKEND_IMAGE:-agent-backend:latest}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: agent-backend
    restart: unless-stopped
    ports:
      - "${AGENT_BACKEND_PORT:-8066}:8066"
    env_file:
      - ./.env
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      agent-mysql:
        condition: service_healthy
      agent-pgvector:
        condition: service_healthy
    networks:
      - agent-network

  agent-mcp-csdn:
    image: ${AGENT_MCP_CSDN_IMAGE:-agent-mcp-csdn:latest}
    build:
      context: ../../../mcp
      dockerfile: Dockerfile
      args:
        MCP_MODULE: mcp-server-csdn
        MCP_JAR: mcp-server-csdn.jar
        MCP_PORT: 9001
    container_name: agent-mcp-csdn
    restart: unless-stopped
    expose:
      - "9001"
    networks:
      - agent-network

  agent-mcp-amap:
    image: ${AGENT_MCP_AMAP_IMAGE:-agent-mcp-amap:latest}
    build:
      context: ../../../mcp
      dockerfile: Dockerfile
      args:
        MCP_MODULE: mcp-server-amap
        MCP_JAR: mcp-server-amap.jar
        MCP_PORT: 9003
    container_name: agent-mcp-amap
    restart: unless-stopped
    expose:
      - "9003"
    networks:
      - agent-network

  agent-mcp-email:
    image: ${AGENT_MCP_EMAIL_IMAGE:-agent-mcp-email:latest}
    build:
      context: ../../../mcp
      dockerfile: Dockerfile
      args:
        MCP_MODULE: mcp-server-email
        MCP_JAR: mcp-server-email.jar
        MCP_PORT: 9004
    container_name: agent-mcp-email
    restart: unless-stopped
    expose:
      - "9004"
    networks:
      - agent-network

  agent-mcp-bocha:
    image: ${AGENT_MCP_BOCHA_IMAGE:-agent-mcp-bocha:latest}
    build:
      context: ../../../mcp
      dockerfile: Dockerfile
      args:
        MCP_MODULE: mcp-server-bocha
        MCP_JAR: mcp-server-bocha.jar
        MCP_PORT: 9005
    container_name: agent-mcp-bocha
    restart: unless-stopped
    expose:
      - "9005"
    networks:
      - agent-network

  agent-frontend:
    image: ${AGENT_FRONTEND_IMAGE:-agent-frontend:latest}
    build:
      context: ../../../frontend
      dockerfile: Dockerfile
    container_name: agent-frontend
    restart: unless-stopped
    ports:
      - "${AGENT_FRONTEND_PORT:-80}:80"
    depends_on:
      agent-backend:
        condition: service_started
    networks:
      - agent-network

