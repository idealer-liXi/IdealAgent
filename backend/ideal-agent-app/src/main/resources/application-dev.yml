server:
  port: 8066
  servlet:
    context-path: /idealagent/api/v1

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:13306/ideal_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

mybatis:
  mapper-locations: classpath:/mapper/*.xml

ideal-agent:
  embedding:
    base-url: ${OPENAI_BASE_URL:}
    api-key: ${OPENAI_API_KEY:}
    model: ${EMBEDDING_MODEL:text-embedding-v4}
    dimensions: ${EMBEDDING_DIMENSIONS:1024}
    encoding-format: float
    embeddings-path: /v1/embeddings
  jwt:
    issuer: ideal-agent
    secret: ideal-agent-dev-secret-change-me
    expire-hours: 168
  rag:
    pgvector:
      url: jdbc:postgresql://127.0.0.1:5432/ideal_agent
      username: idealagent
      password: 123456
      table-name: public.vector_store_openai
